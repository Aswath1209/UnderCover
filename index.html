<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undercover Rewards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid var(--tg-theme-secondary-bg-color, #f3f3f3);
            border-top: 4px solid var(--tg-theme-button-color, #248bfe);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none; }
        .btn {
            background-color: var(--tg-theme-button-color, #248bfe);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading-box">
        <div class="loader"></div>
        <p>Loading your ad...</p>
    </div>

    <div id="ad-box" class="hidden">
        <h2>Ad Ready!</h2>
        <p>Watch to claim your mystery reward.</p>
        <button class="btn" id="play-btn">📺 Watch Now</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const urlParams = new URLSearchParams(window.location.search);
        const msgId = urlParams.get('msg_id');

        window.initCdTma?.({ id: 6119106 })
            .then(show => {
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('ad-box').classList.remove('hidden');
                
                document.getElementById('play-btn').onclick = () => {
                    show().then(() => {
                        // Notify the server to give reward and edit message
                        fetch(`/api/reward?user_id=${userId}&msg_id=${msgId}`)
                            .then(() => tg.close())
                            .catch(() => tg.close());
                    }).catch(() => {
                        alert("Ad interrupted. Please try again!");
                    });
                };
            })
            .catch(() => {
                alert("Could not load ad. Please try again later!");
                tg.close();
            });
    </script>
</body>
</html>
