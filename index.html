<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mystery Drop</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: var(--tg-theme-button-color, #248bfe);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }
        .hidden { display: none; }
        .status { font-size: 14px; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="ad-prompt">
            <h2>🎁 Mystery Drop</h2>
            <p>Watch a short video to open your mystery crate!</p>
            <button class="btn" id="watch-btn">📦 Open Crate</button>
            <div class="status" id="status">Ready to open!</div>
        </div>

        <div id="reward-box" class="hidden">
            <h2 style="color: #4caf50;">✅ Crate Unlocked!</h2>
            <p>Your reward is ready.</p>
            <button class="btn" id="claim-btn">💰 Claim Coins</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const urlParams = new URLSearchParams(window.location.search);
        const msgId = urlParams.get('msg_id');

        // Initialize Adsgram with your Block ID
        const AdController = window.Adsgram.init({ blockId: "30301" });
        
        document.getElementById('watch-btn').onclick = () => {
            const status = document.getElementById('status');
            const btn = document.getElementById('watch-btn');
            
            btn.disabled = true;
            status.innerText = "Opening crate...";

            AdController.show().then((result) => {
                // Success
                document.getElementById('ad-prompt').classList.add('hidden');
                document.getElementById('reward-box').classList.remove('hidden');
            }).catch((result) => {
                // Error/Closed
                btn.disabled = false;
                status.innerText = "Please watch the full video to unlock!";
                alert("Watch the full video to claim your coins!");
            });
        };

        document.getElementById('claim-btn').onclick = () => {
            fetch(`/api/reward?user_id=${userId}&msg_id=${msgId}`)
                .then(() => tg.close())
                .catch(() => tg.close());
        };
    </script>
</body>
</html>
