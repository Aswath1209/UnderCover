<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Bonus</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: var(--tg-theme-button-color, #248bfe);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { font-size: 14px; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Adsgram Test Bonus</h2>
        <p>Watch a video ad to claim 500 coins!</p>
        <button class="btn" id="watch-btn">📺 Watch Ad</button>
        <div class="status" id="status">Ready!</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const urlParams = new URLSearchParams(window.location.search);
        const msgId = urlParams.get('msg_id');

        // Initialize Adsgram with Block ID 29859
        const AdController = window.Adsgram.init({ blockId: "3760" });
        
        document.getElementById('watch-btn').onclick = () => {
            const btn = document.getElementById('watch-btn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "Opening Adsgram video...";

            AdController.show().then((result) => {
                // Video finished successfully
                status.innerText = "Success! Claiming coins...";
                fetch(`/api/reward?user_id=${userId}&msg_id=${msgId}`)
                    .then(() => tg.close())
                    .catch(() => tg.close());
            }).catch((result) => {
                // Error or closed early
                btn.disabled = false;
                status.innerText = "Ad not finished. No reward.";
                alert("Please watch the full video to get your reward!");
            });
        };
    </script>
</body>
</html>
